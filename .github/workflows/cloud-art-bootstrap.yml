name: Cloud art bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cloud-art-bootstrap.yml"

permissions:
  contents: write

concurrency:
  group: idea-zoo-cloud-art-bootstrap
  cancel-in-progress: false

jobs:
  generate-complete-package:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cloud-art-production-v1
          fetch-depth: 0

      - name: Make generator compatible across Blender runner versions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('cloud_art/generate_idea_zoo_assets.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '            mat.show_transparent_back = True\n',
              '            if hasattr(mat, "show_transparent_back"):\n                mat.show_transparent_back = True\n',
          )
          text = text.replace(
              '        export_animations=False, export_apply=True,\n',
              '        export_animations=False,\n',
          )
          path.write_text(text, encoding='utf-8')
          PY
          python3 -m py_compile cloud_art/generate_idea_zoo_assets.py

      - name: Install Blender and contact-sheet tools
        run: |
          sudo apt-get update
          sudo apt-get install -y blender
          python3 -m pip install --disable-pip-version-check pillow
          python3 -c "import PIL; print('Pillow', PIL.__version__)"
          blender --version

      - name: Generate all modeled and rigged assets
        run: |
          rm -rf \
            unity/Assets/IdeaZoo/Art/CloudGenerated \
            unity/ArtProduction/Source \
            unity/ArtProduction/Previews \
            unity/ArtProduction/generated_manifest.json
          blender --background --python cloud_art/generate_idea_zoo_assets.py -- \
            --output unity/Assets/IdeaZoo/Art/CloudGenerated/Models \
            --source-output unity/ArtProduction/Source \
            --preview-output unity/ArtProduction/Previews \
            --manifest unity/ArtProduction/generated_manifest.json

      - name: Inspect generated preview files
        run: |
          find unity/ArtProduction/Previews -type f -maxdepth 3 -printf '%p %s bytes\n' | sort
          test "$(find unity/ArtProduction/Previews -name '*.png' -type f | wc -l)" -eq 17

      - name: Build complete visual contact sheet
        continue-on-error: true
        run: |
          python3 cloud_art/make_contact_sheet.py \
            --input unity/ArtProduction/Previews \
            --output unity/ArtProduction/Previews/IdeaZoo_CloudArt_ContactSheet.png

      - name: Validate deliverables and geometry budgets
        run: |
          python3 cloud_art/validate_generated_assets.py \
            --manifest unity/ArtProduction/generated_manifest.json \
            --repo-root "$GITHUB_WORKSPACE"

      - name: Commit complete generated package to art branch
        run: |
          git config user.name "Idea Zoo Cloud Art"
          git config user.email "actions@users.noreply.github.com"
          git add \
            cloud_art/generate_idea_zoo_assets.py \
            unity/Assets/IdeaZoo/Art/CloudGenerated \
            unity/ArtProduction/Source \
            unity/ArtProduction/Previews \
            unity/ArtProduction/generated_manifest.json
          if git diff --cached --quiet; then
            echo "Generated package already matches the source definitions."
          else
            git commit -m "art(cloud): generate complete modeled and rigged design package"
            git push origin HEAD:cloud-art-production-v1
          fi

      - name: Upload complete package
        uses: actions/upload-artifact@v4
        with:
          name: idea-zoo-complete-modeled-rigged-package
          path: |
            unity/Assets/IdeaZoo/Art/CloudGenerated
            unity/ArtProduction
          if-no-files-found: error
