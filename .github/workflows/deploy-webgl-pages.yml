name: Deploy Idea Zoo WebGL to Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-webgl-pages.yml"

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download verified WebGL build
        uses: actions/download-artifact@v4
        with:
          name: idea-zoo-unity-webgl
          path: site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29356981776

      - name: Prepare Unity build for static hosting
        shell: bash
        run: |
          set -euo pipefail
          ROOT="site/IdeaZooWebGL"
          test -f "$ROOT/index.html"
          gzip -dk "$ROOT/Build/IdeaZooWebGL.data.gz"
          gzip -dk "$ROOT/Build/IdeaZooWebGL.framework.js.gz"
          gzip -dk "$ROOT/Build/IdeaZooWebGL.wasm.gz"
          rm "$ROOT/Build/IdeaZooWebGL.data.gz" \
             "$ROOT/Build/IdeaZooWebGL.framework.js.gz" \
             "$ROOT/Build/IdeaZooWebGL.wasm.gz"
          sed -i \
            -e 's/Unity Web Player | unity/The Idea Zoo — Browser Playtest/' \
            -e 's/IdeaZooWebGL.data.gz/IdeaZooWebGL.data/' \
            -e 's/IdeaZooWebGL.framework.js.gz/IdeaZooWebGL.framework.js/' \
            -e 's/IdeaZooWebGL.wasm.gz/IdeaZooWebGL.wasm/' \
            -e 's/companyName: "DefaultCompany"/companyName: "Idea Zoo"/' \
            -e 's/productName: "unity"/productName: "The Idea Zoo"/' \
            -e 's/<div id="unity-build-title">unity<\/div>/<div id="unity-build-title">The Idea Zoo<\/div>/' \
            "$ROOT/index.html"
          touch "$ROOT/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/IdeaZooWebGL

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Record deployment receipt
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          SOURCE_RUN_ID: "29356981776"
          SOURCE_HEAD_SHA: "494b46a0942e09b3e20e4de264e35ef032334985"
        with:
          script: |
            const path = 'deployment-status/webgl-pages.json';
            const receipt = {
              deployed: process.env.DEPLOY_OUTCOME === 'success',
              outcome: process.env.DEPLOY_OUTCOME || 'not-run',
              pageUrl: process.env.PAGE_URL || '',
              sourceRunId: process.env.SOURCE_RUN_ID,
              sourceHeadSha: process.env.SOURCE_HEAD_SHA,
              workflowRunId: String(context.runId),
              recordedAt: new Date().toISOString()
            };
            let sha;
            try {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: 'main'
              });
              sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: `ci: record WebGL Pages deployment ${context.runId}`,
              content: Buffer.from(JSON.stringify(receipt, null, 2) + '\n').toString('base64'),
              branch: 'main',
              sha
            });
