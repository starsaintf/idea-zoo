name: Godot mobile validation

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "godot/**"
      - ".github/workflows/godot-ci.yml"
  workflow_dispatch:

jobs:
  validate-and-export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Use absolute mobile control coordinates
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.head_ref }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          hud = Path('godot/scripts/hud.gd')
          text = hud.read_text()
          old = '''\tjoystick.position = Vector2(TOUCH_SAFE_SIDE, -154.0 - TOUCH_SAFE_BOTTOM)
          \tinteract_button.position = Vector2(-118.0 - TOUCH_SAFE_SIDE, -118.0 - TOUCH_SAFE_BOTTOM)
          \tlens_button.position = Vector2(-226.0 - TOUCH_SAFE_SIDE, -92.0 - TOUCH_SAFE_BOTTOM)
          \tcycle_button.position = Vector2(-218.0 - TOUCH_SAFE_SIDE, -184.0 - TOUCH_SAFE_BOTTOM)
          \tperformance_button.position = Vector2(-122.0 - TOUCH_SAFE_SIDE, 122.0)
          \tdiagnostics_button.position = Vector2(-122.0 - TOUCH_SAFE_SIDE, 168.0)
          \tdiagnostics_label.position = Vector2(-300.0 - TOUCH_SAFE_SIDE, 216.0)
          '''.replace('\n          ', '\n')
          new = '''\tvar controls = [joystick, interact_button, lens_button, cycle_button, performance_button, diagnostics_button, diagnostics_label]
          \tfor control in controls:
          \t\tcontrol.set_anchors_preset(Control.PRESET_TOP_LEFT)
          \tjoystick.position = Vector2(TOUCH_SAFE_SIDE, viewport_size.y - 154.0 - TOUCH_SAFE_BOTTOM)
          \tinteract_button.position = Vector2(viewport_size.x - 118.0 - TOUCH_SAFE_SIDE, viewport_size.y - 118.0 - TOUCH_SAFE_BOTTOM)
          \tlens_button.position = Vector2(viewport_size.x - 118.0 - TOUCH_SAFE_SIDE - 16.0 - 92.0, viewport_size.y - 92.0 - TOUCH_SAFE_BOTTOM)
          \tcycle_button.position = Vector2(viewport_size.x - 118.0 - TOUCH_SAFE_SIDE - 8.0 - 76.0, viewport_size.y - 118.0 - TOUCH_SAFE_BOTTOM - 76.0 - 10.0)
          \tperformance_button.position = Vector2(viewport_size.x - 122.0 - TOUCH_SAFE_SIDE, 122.0)
          \tdiagnostics_button.position = Vector2(viewport_size.x - 122.0 - TOUCH_SAFE_SIDE, 168.0)
          \tdiagnostics_label.position = Vector2(viewport_size.x - 300.0 - TOUCH_SAFE_SIDE, 216.0)
          '''.replace('\n          ', '\n')
          if old in text:
              hud.write_text(text.replace(old, new, 1))

          test = Path('godot/tests/mobile_contract_test.gd')
          text = test.read_text()
          text = text.replace('_near(game.hud.interact_button.position.x, -194.0)', '_near(game.hud.interact_button.position.x, viewport_size.x - 194.0)')
          text = text.replace('_near(game.hud.interact_button.position.y, -164.0)', '_near(game.hud.interact_button.position.y, viewport_size.y - 164.0)')
          text = text.replace('_near(game.hud.performance_button.position.x, -198.0)', '_near(game.hud.performance_button.position.x, viewport_size.x - 198.0)')
          test.write_text(text)
          PY
          if ! git diff --quiet -- godot/scripts/hud.gd godot/tests/mobile_contract_test.gd; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add godot/scripts/hud.gd godot/tests/mobile_contract_test.gd
            git commit -m "Place mobile controls with absolute safe-area coordinates"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:"${BRANCH}"
          fi

      - name: Verify mobile optimization contract
        run: |
          grep -q 'spring_arm.add_excluded_object(get_rid())' godot/scripts/player.gd
          grep -q 'camera_zone_bottom_ratio = 0.68' godot/scripts/player.gd
          grep -q 'TOUCH_SAFE_SIDE = 76.0' godot/scripts/hud.gd
          grep -q 'IDEA_ZOO_MOBILE_TEST' godot/scripts/hud.gd
          grep -q 'control.set_anchors_preset(Control.PRESET_TOP_LEFT)' godot/scripts/hud.gd
          grep -q '"ECO 30"' godot/scripts/main.gd
          grep -q 'diagnostics_duration = 600.0' godot/scripts/main.gd
          if grep -Rnw godot/scripts -e 'class_name'; then exit 1; fi

      - name: Download Godot 4.7 and export templates
        run: |
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          curl -L -o /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.7-stable_linux.x86_64
          mkdir -p "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp -R /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Parse project and import resources
        working-directory: godot
        run: |
          set +e
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --editor --quit --path . > /tmp/godot-parse.log 2>&1
          status=$?
          if [ "$status" -ne 0 ] || grep -q -E "SCRIPT ERROR: Parse Error|Failed to load script.*Parse error" /tmp/godot-parse.log; then exit 1; fi

      - name: Run startup smoke test
        working-directory: godot
        run: |
          set +e
          timeout 30s /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --quit-after 180 > /tmp/godot-runtime.log 2>&1
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then exit "$status"; fi
          if grep -q -E "SCRIPT ERROR|Parse Error|Invalid call|Invalid access" /tmp/godot-runtime.log; then exit 1; fi

      - name: Run 896x414 iPhone touch contract
        working-directory: godot
        run: |
          mkdir -p build
          IDEA_ZOO_MOBILE_TEST=1 xvfb-run -a /tmp/godot/Godot_v4.7-stable_linux.x86_64 --resolution 896x414 --path . --script res://tests/mobile_contract_test.gd

      - name: Upload iPhone contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-touch-contract
          path: |
            godot/build/mobile-test-results.json
            godot/build/mobile-test-camera.png
          if-no-files-found: error

      - name: Export installable mobile web build
        working-directory: godot
        run: |
          mkdir -p build/web
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --export-release Web build/web/index.html

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: idea-zoo-godot-web
          path: godot/build/web

      - name: Publish playable preview branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd godot/build/web
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b godot-preview
          git add .
          git commit -m "Publish iPhone-optimized Idea Zoo preview"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin godot-preview
