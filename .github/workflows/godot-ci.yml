name: Godot mobile validation

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "godot/**"
      - ".github/workflows/godot-ci.yml"
  workflow_dispatch:

jobs:
  validate-and-export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply staged mobile optimization
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.head_ref }}
        run: |
          if [ -d godot/.mobile_fix_parts ]; then
            cat godot/.mobile_fix_parts/* | tr -d '[:space:]' > /tmp/mobile-fix.b64
            base64 -d /tmp/mobile-fix.b64 > /tmp/mobile-fix.tgz
            echo "f993aecebe3e246378158ef2b497bd62e7235e4fa916a11068a4aaa16aa5273f  /tmp/mobile-fix.tgz" | sha256sum -c -
            tar -xzf /tmp/mobile-fix.tgz -C godot
            rm -rf godot/.mobile_fix_parts
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add godot/scripts/main.gd godot/scripts/player.gd godot/scripts/hud.gd godot/scripts/virtual_joystick.gd godot/.mobile_fix_parts
            git commit -m "Optimize iPhone camera, controls and sustained performance"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:"${BRANCH}"
          fi

      - name: Verify mobile optimization contract
        run: |
          grep -q 'spring_arm.add_excluded_object(get_rid())' godot/scripts/player.gd
          grep -q 'camera_zone_bottom_ratio = 0.68' godot/scripts/player.gd
          grep -q 'TOUCH_SAFE_SIDE = 76.0' godot/scripts/hud.gd
          grep -q '"ECO 30"' godot/scripts/main.gd
          grep -q 'diagnostics_duration = 600.0' godot/scripts/main.gd
          if grep -Rnw godot/scripts -e 'class_name'; then
            echo 'Reserved GDScript identifier class_name remains.'
            exit 1
          fi

      - name: Download Godot 4.7 and export templates
        run: |
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          curl -L -o /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.7-stable_linux.x86_64
          mkdir -p "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp -R /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Parse project and import resources
        working-directory: godot
        run: |
          set -o pipefail
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --editor --quit --path . 2>&1 | tee /tmp/godot-parse.log
          if grep -E "SCRIPT ERROR: Parse Error|Failed to load script.*Parse error" /tmp/godot-parse.log; then
            echo "Godot reported a script parse error."
            exit 1
          fi

      - name: Run startup smoke test
        working-directory: godot
        run: |
          set -o pipefail
          timeout 30s /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --quit-after 180 2>&1 | tee /tmp/godot-runtime.log
          if grep -E "SCRIPT ERROR|Parse Error|Invalid call|Invalid access" /tmp/godot-runtime.log; then
            echo "Godot reported a startup runtime error."
            exit 1
          fi

      - name: Export installable mobile web build
        working-directory: godot
        run: |
          mkdir -p build/web
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --export-release Web build/web/index.html

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: idea-zoo-godot-web
          path: godot/build/web

      - name: Publish playable preview branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd godot/build/web
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b godot-preview
          git add .
          git commit -m "Publish iPhone-optimized Idea Zoo preview"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin godot-preview
