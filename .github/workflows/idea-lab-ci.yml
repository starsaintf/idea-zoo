name: Idea Lab chapter validation

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "godot/**"
      - ".github/workflows/idea-lab-ci.yml"
  workflow_dispatch:

jobs:
  validate-real-idea-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download Godot 4.7
        run: |
          curl -L -o /tmp/godot.zip https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          curl -L -o /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.7-stable_linux.x86_64
          mkdir -p "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp -R /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Parse every script and import resources
        working-directory: godot
        run: |
          set -o pipefail
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --editor --quit --path . 2>&1 | tee /tmp/idea-lab-parse.log
          if grep -E "SCRIPT ERROR|Parse Error|Failed to load script" /tmp/idea-lab-parse.log; then exit 1; fi

      - name: Run startup smoke test
        working-directory: godot
        run: |
          timeout 30s /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --quit-after 180 > /tmp/idea-lab-runtime.log 2>&1 || status=$?
          if [ "${status:-0}" -ne 0 ] && [ "${status:-0}" -ne 124 ]; then cat /tmp/idea-lab-runtime.log; exit "${status}"; fi
          if grep -E "SCRIPT ERROR|Parse Error|Invalid call|Invalid access" /tmp/idea-lab-runtime.log; then cat /tmp/idea-lab-runtime.log; exit 1; fi

      - name: Run complete intake-to-ruling contract
        working-directory: godot
        run: |
          mkdir -p build
          IDEA_ZOO_MOBILE_TEST=1 xvfb-run -a /tmp/godot/Godot_v4.7-stable_linux.x86_64 --resolution 896x414 --path . --script res://tests/idea_lab_contract.gd

      - name: Upload chapter evidence
        uses: actions/upload-artifact@v4
        with:
          name: idea-lab-contract
          path: |
            godot/build/idea-lab-contract.json
            godot/build/idea-lab-contract.png
          if-no-files-found: error

      - name: Export mobile Web build
        working-directory: godot
        run: |
          mkdir -p build/web
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --export-release Web build/web/index.html

      - name: Upload playable Web build
        uses: actions/upload-artifact@v4
        with:
          name: idea-zoo-real-idea-web
          path: godot/build/web

      - name: Publish real-idea preview branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd godot/build/web
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b idea-lab-preview
          git add .
          git commit -m "Publish real-world Idea Zoo laboratory"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin idea-lab-preview
