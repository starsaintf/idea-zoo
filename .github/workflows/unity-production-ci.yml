name: Unity production validation

on:
  push:
    branches: [unity-production-v1]
    paths:
      - "unity/**"
      - "scripts/validate_unity_foundation.py"
      - ".github/workflows/unity-production-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "unity/**"
      - "scripts/validate_unity_foundation.py"
      - ".github/workflows/unity-production-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  domain-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Compile and run engine-independent contracts
        run: dotnet run --project unity/Tests/IdeaZoo.Domain.Contract/IdeaZoo.Domain.Contract.csproj --configuration Release

  unity-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production project structure and source contracts
        run: python3 scripts/validate_unity_foundation.py
      - name: Confirm failed transport files are gone
        run: |
          test ! -d .unity-bootstrap
          ! git ls-files | grep -E '(^|/)chunk-[0-9]+$|bootstrap-unity-source'
      - name: Package reviewable Unity source
        run: zip -qr idea-zoo-unity-production-source.zip unity scripts/validate_unity_foundation.py .github/workflows/unity-production-ci.yml
      - uses: actions/upload-artifact@v4
        with:
          name: idea-zoo-unity-production-source
          path: idea-zoo-unity-production-source.zip
