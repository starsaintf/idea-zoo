name: Unity source fixup

on:
  pull_request:
    branches: [main]
    paths:
      - "unity/**"
      - ".github/workflows/unity-source-fixup.yml"

permissions:
  contents: write

jobs:
  normalize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: unity-production-v1
      - name: Reuse the existing UI RectTransform
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('unity/Assets/IdeaZoo/Runtime/IdeaZooActors.cs')
          source = path.read_text()
          old = '_rect = gameObject.AddComponent<RectTransform>();'
          new = '_rect = transform as RectTransform;\n            if (_rect == null) throw new InvalidOperationException("MobileJoystick requires a RectTransform.");'
          if old not in source:
              raise SystemExit('Expected joystick construction line was not found')
          path.write_text(source.replace(old, new, 1))
          PY
          rm .github/workflows/unity-source-fixup.yml
      - name: Commit normalized Unity source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Unity joystick construction"
          git push origin unity-production-v1
